  <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- NAVBAR -->
<header class="header-area">
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-dark position-relative">

      <a class="navbar-brand" href="index.html">UrbanBite</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navMenu">

        <ul class="navbar-nav position-absolute start-50 translate-middle-x">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="menu.html">Menu</a>
          </li>
          <li class="nav-item">

          <a href="#" class="cart-icon">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
        </div>

      </div>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero-section d-flex align-items-center text-center text-white" style="height:60vh;">
  <div class="container">
    <h1 class="display-4">Reserve Your Table</h1>
    <p class="lead">Enjoy an unforgettable dining experience</p>
  </div>
</section>

<!-- RESERVATION SECTION -->
<section class="reservation-section py-5">
  <div class="container">
    <div class="row align-items-stretch g-5">

      <!-- FORM SIDE -->
      <div class="col-lg-6 mb-4">
        <div class="reservation-card">
          <h2 class="section-title mb-4">Book a Table</h2>

          <form>
            <div class="row g-3">

              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Your Name" required>
              </div>

              <div class="col-md-6">
                <input type="tel" class="form-control" placeholder="Phone Number" required>
              </div>

              <div class="col-12">
                <input type="email" class="form-control" placeholder="Your Email" required>
              </div>

              <div class="col-md-6">
                <select class="form-select" required>
                  <option selected disabled>Number of Guests</option>
                  <option>1 Person</option>
                  <option>2 Persons</option>
                  <option>3 Persons</option>
                  <option>4 Persons</option>
                  <option>5+ Persons</option>
                </select>
              </div>

              <div class="col-md-6">
                <input type="date" class="form-control" required>
              </div>

              <div class="col-12 text-center mt-3">
                <button type="submit" class="btn btn-warning px-5 py-2">
                  Reserve Now
                </button>
              </div>

            </div>
          </form>
        </div>
      </div>

      <!-- MAP SIDE -->
<div class="col-lg-6 mb-4">
    <div class="map-wrapper">
        <iframe 
    src="https://www.google.com/maps?q=Pune,India&output=embed"
    allowfullscreen=""
    loading="lazy">
    </iframe>
  </div>
</div>

<!-- FOOTER -->
<footer class="text-white py-4 text-center">
  <div class="container">
    <h5>UrbanBite</h5>
    <p>Pune | 10:00 AM – 10:00 PM</p>
    <p>© <span id="displayYear"></span> UrbanBite. All Rights Reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- YEAR SCRIPT -->
<script>
function getYear() {
  document.getElementById("displayYear").innerHTML = new Date().getFullYear();
}
getYear();
</script>



<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_KEY&callback=myMap"></script>
