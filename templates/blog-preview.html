{% extends "base.html" %}

{% block content %}

<!-- BLOG DETAILS -->
<div class="container-fluid blog-details-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9">

                <div class="blog-article-card p-4 p-md-5 wow fadeIn">

                    <!-- Dynamic Title -->
                    <h1 class="blog-title mb-3" id="blogTitle"></h1>

                    <!-- Dynamic Meta -->
                    <div class="blog-meta mb-4">
                        <span>
                            <i class="far fa-clock me-2"></i>
                            <span id="blogReadTime"></span>
                        </span>
                        <span class="ms-4">
                            <i class="fa fa-folder me-2"></i>
                            <span id="blogCategory"></span>
                        </span>
                    </div>

                    <!-- Dynamic Image -->
                    <div class="blog-hero mb-4">
                        <img id="blogImage" style="width:100%; border-radius:12px;">
                    </div>

                    <!-- Dynamic Content -->
                    <div id="blogContent"></div>

                    <!-- CTA -->
                    <div class="blog-cta mt-5">
                        <h5>Ready to Build Your Website?</h5>
                        <p>WebStudio helps businesses create modern, responsive, professional websites.</p>

                        <a href="{{ url_for('contact') }}" class="btn btn-primary rounded-pill px-4 py-2 me-2">
                            Contact Us
                        </a>

                        <a href="{{ url_for('admin_view_blogs') }}" class="btn btn-primary rounded-pill px-4 py-2">
                            ← Back to Blogs
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>

<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", async function () {

    const blogId = new URLSearchParams(window.location.search).get("id");

    if (!blogId) {
        document.getElementById("blogTitle").innerText = "Invalid Preview URL";
        return;
    }

    if (!window.supabase) {
        console.error("Supabase not loaded");
        return;
    }

    // ✅ Create client locally
    const supabaseClient = window.supabase.createClient(
        "https://yuuvbsctwcrzubblkjlq.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1dXZic2N0d2NyenViYmxramxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3ODIzNjYsImV4cCI6MjA4NjM1ODM2Nn0.2js6OF_T1oBECrSHJVgSF7_H5KYTpWqdQAGjgs5dVUs"
    );

    async function loadPreview() {

        const { data, error } = await supabaseClient
            .from("blogs")
            .select("*")
            .eq("id", blogId)
            .single(); // ❗ NO status filter (preview mode)

        console.log("Preview Data:", data);
        console.log("Error:", error);

        if (error || !data) {
            document.getElementById("blogTitle").innerText = "Blog not found";
            return;
        }

        document.getElementById("blogTitle").innerText = data.title;
        document.getElementById("blogCategory").innerText = data.category;
        document.getElementById("blogReadTime").innerText = data.read_time + " min read";
        document.getElementById("blogImage").src = data.image_url;
        document.getElementById("blogContent").innerHTML = data.content;
    }

    loadPreview();
});
</script>

{% endblock %}
