</head>

<body>

    <!-- Spinner -->
    <div id="spinner" class="show position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-secondary"></div>
    </div>

    <!-- Topbar Start -->
        <div class="container-fluid bg-dark py-2 d-none d-md-flex">
            <div class="container">
                <div class="d-flex justify-content-between topbar">
                    
                </div>
            </div>
        </div>
        <!-- Topbar End -->

    <!-- Navbar -->
    {% include 'navbar.html' %}

    <!-- 🔥 PAGE CONTENT -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    {% include 'footer.html' %}

     <!-- Chatbot overlay -->
        <div class="chatbot-overlay" id="chatbot-overlay"></div>

        <!-- Chat Panel -->
        <div id="chatbot-popup" class="chatbot-popup" role="dialog">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-avatar"><i class="fa fa-headset"></i></div>
                    <div class="chat-header-info">
                        <strong>WebStudio Support</strong>
                        <div class="chat-status"><span class="chat-status-dot"></span> Online</div>
                    </div>
                </div>
                <button class="chat-close" id="chat-close-btn"><i class="fa fa-times"></i></button>
            </div>
            <div id="chat-body" class="chat-body"></div>
            <div class="chat-footer-note">Powered by <a href="#">WebStudio</a> · thewebstudio.io@gmail.com</div>
        </div>

        <!-- Trigger Button -->
        <a href="#" class="btn chatbot-btn" id="chatbot-btn">
            <span class="chatbot-badge" id="chatbot-badge">1</span>
            <i class="fa fa-headset"></i>
        </a>


        <!-- Back to Top -->
        <a href="#" class="btn btn-secondary btn-square rounded-circle back-to-top"><i class="fa fa-arrow-up text-white"></i></a>
